services:
  api1: &api-service
    build:
      context: .
      target: development
    env_file:
      - .env
    environment:
      - IS_MAIN_INSTANCE=true
    volumes:
      - .:/app
      - memorydb_data:/app/data
    ports:
      - "3001:8080"
    command: ["bun", "run", "dev"]
    networks:
      - backend
      - payment-processor
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.6"
          memory: "115MB"

  api2:
    <<: *api-service
    ports:
      - "3002:8080"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "100MB"

  nginx:
    image: nginx:alpine
    env_file:
      - .env
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - backend
    ports:
      - "9999:80"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "20MB"

networks:
  backend:
    driver: bridge
  payment-processor:
    external: true

volumes:
  memorydb_data: